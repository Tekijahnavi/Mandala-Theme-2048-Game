<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala 2048 - A Meditative Puzzle Game</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <h1 class="game-title">Mandala 2048</h1>
            <p class="game-subtitle">A Meditative Journey</p>
        </header>

        <main class="game-main">
            <div class="game-controls">
                <div class="score-container">
                    <div class="score-box">
                        <span class="score-label">Score</span>
                        <span class="score-value" id="score">0</span>
                    </div>
                    <div class="score-box">
                        <span class="score-label">Best</span>
                        <span class="score-value" id="best-score">0</span>
                    </div>
                </div>
                <div class="button-container">
                    <button class="btn btn-primary" id="new-game">New Game</button>
                    <button class="btn btn-secondary" id="theme-toggle">Dark Mode</button>
                </div>
            </div>

            <div class="game-board-container">
                <div class="game-board" id="game-board">
                    <!-- Grid will be generated by JavaScript -->
                </div>
                <div class="game-overlay" id="game-overlay">
                    <div class="overlay-content">
                        <h2 class="overlay-title" id="overlay-title">Game Over</h2>
                        <p class="overlay-message" id="overlay-message">No more moves available</p>
                        <div class="overlay-buttons">
                            <button class="btn btn-primary" id="restart-btn">Try Again</button>
                            <button class="btn btn-secondary" id="continue-btn" style="display: none;">Continue</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-instructions">
                <p class="instructions-text">
                    <strong>How to play:</strong> Use arrow keys or swipe to move tiles. 
                    When two tiles with the same mandala touch, they merge into one!
                </p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
